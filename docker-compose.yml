services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatbotdb
    ports:
      - "5432:5432"
    volumes:
      # - ./pgdata:/var/lib/postgresql/data
      - ./data:/docker-entrypoint-initdb.d
      - ./csvdata:/csvdata
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=${DB_PASSWORD} pg_isready -U ${DB_USER} -d ${DB_NAME} && PGPASSWORD=${DB_PASSWORD} psql -U ${DB_USER} -d ${DB_NAME} -tAc \"SELECT 1 FROM import_status WHERE chave='seed_status' AND valor='done'\" | grep -q '^1$'"
        ]
      interval: 10s
      timeout: 10s
      retries: 90
      start_period: 900s
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    env_file: .env
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped